<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emrah Ömer Çam | EÖÇ Mimarlık</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold: #C9A86A;
    --gold-soft: #E4CB99;
    --near-black: #121212;
    --panel: #1B1B1B;
    --panel-border: rgba(201,168,106,0.28);
    --text-main: #F1EDE4;
    --text-muted: #A8A29A;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background:
      radial-gradient(ellipse at 50% -10%, rgba(201,168,106,0.10), transparent 60%),
      var(--near-black);
    color:var(--text-main);
    font-family:'DM Sans', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  .card{
    width:100%;
    max-width:420px;
    min-height:100vh;
    padding:32px 20px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---- Logo ---- */
  .logo{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:28px;
  }
  .logo-img{
    height:144px;
    width:auto;
    display:block;
  }

  /* ---- Identity ---- */
  .identity{ text-align:center; margin-bottom:26px; }
  .identity .script{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:20px;
    color:var(--gold-soft);
    margin-bottom:6px;
  }
  .identity .name{
    font-family:'DM Sans', sans-serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:1px;
    color:var(--text-main);
  }
  .identity .title{
    font-family:'DM Sans', sans-serif;
    font-weight:500;
    font-size:13px;
    letter-spacing:3px;
    color:var(--gold);
    margin-top:8px;
  }
  .identity .role{
    font-size:12px;
    letter-spacing:2px;
    color:var(--text-muted);
    margin-top:4px;
  }

  /* ---- Card panel ---- */
  .panel{
    width:100%;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.15));
    border:1px solid var(--panel-border);
    border-radius:28px;
    padding:30px 22px 26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  }

  .avatar-ring{
    width:150px; height:150px;
    border-radius:50%;
    padding:3px;
    background:conic-gradient(from 180deg, var(--gold), #7a6135, var(--gold));
    margin-bottom:18px;
  }
  .avatar-ring .inner{
    width:100%; height:100%;
    border-radius:50%;
    overflow:hidden;
    background:#2a2a2a;
    display:flex; align-items:center; justify-content:center;
  }
  .avatar-ring img{ width:100%; height:100%; object-fit:cover; display:block; }
  .avatar-ring .placeholder{
    font-family:'Cormorant Garamond', serif;
    font-size:44px;
    color:var(--gold-soft);
  }

  .mini-logo{ margin-bottom:20px; opacity:0.95; display:flex; justify-content:center; }
  .mini-logo-img{ height:30px; width:auto; display:block; }

  .contact-list{ width:100%; display:flex; flex-direction:column; gap:14px; margin-bottom:22px; }
  .contact-row{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:var(--text-main);
  }
  .contact-row .icon{
    width:34px; height:34px;
    border-radius:50%;
    border:1px solid var(--panel-border);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .contact-row .icon svg{ width:16px; height:16px; stroke:var(--gold); fill:none; }
  .contact-row span{ font-size:14px; color:#E9E4D8; letter-spacing:0.3px; }

  .tagline{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:16px;
    color:var(--gold-soft);
  }

  /* ---- Action grid ---- */
  .actions{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:28px;
  }
  .action-btn{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:18px 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:var(--text-main);
    cursor:pointer;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .action-btn:active{ transform:scale(0.96); background:#222; border-color:var(--gold); }
  .action-btn .icon{
    width:38px; height:38px;
    border-radius:50%;
    border:1px solid var(--panel-border);
    display:flex; align-items:center; justify-content:center;
  }
  .action-btn .icon svg{ width:18px; height:18px; stroke:var(--gold); fill:none; }
  .action-btn .label{ font-size:13px; font-weight:700; letter-spacing:1px; }
  .action-btn .sub{ font-size:10.5px; color:var(--text-muted); letter-spacing:0.3px; }

  footer{
    margin-top:30px;
    text-align:center;
    font-size:10.5px;
    letter-spacing:1.5px;
    color:var(--text-muted);
  }
  footer a{ color:var(--gold); text-decoration:none; }

  @media (min-width:480px){
    .card{ padding-top:48px; }
  }
</style>
</head>
